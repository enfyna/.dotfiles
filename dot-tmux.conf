set -a terminal-features "tmux-256color:RGB"
set -g prefix C-b
set -g base-index 1
set -g renumber-windows on   
set -g mode-keys vi
set -g status-position top
set -g status-justify left #absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=green bg=default"
set -g status-interval 5
set -g status-left " #S | "
set -g status-right ""

bind r source-file "~/.tmux.conf"
bind b set -g status
bind E show-environment -g
